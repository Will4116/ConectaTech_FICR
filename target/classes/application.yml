spring:
  application:
    name: conecta-tech

  datasource:
    url: jdbc:postgresql://localhost:5432/conectatech
    username: conecta_user
    password: conecta_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    com.conectatech: DEBUG
    org.hibernate.SQL: DEBUG
