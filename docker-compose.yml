version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: conecta-tech-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: conectatech
      POSTGRES_USER: conecta_user
      POSTGRES_PASSWORD: conecta_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U conecta_user -d conectatech" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
